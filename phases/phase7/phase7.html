<!-- phases/phase7/phase7.html -->
<div class="phase active">
    <h1>Market Purchase Simulation</h1>
    <p class="subtitle">Aggregated purchase decisions from all simulated personas.</p>

    <div class="kpi-strip" id="sim-kpi-strip">
        <!-- populated by JS -->
    </div>

    <div class="outcome-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;">
        <div class="chart-card">
            <div class="card-title"><i class="fa-solid fa-chart-pie"></i> Market Share by Persona</div>
            <canvas id="chart-sim-pie" style="max-height:280px;"></canvas>
        </div>
        <div class="chart-card">
            <div class="card-title"><i class="fa-solid fa-chart-bar"></i> Personas Per Product</div>
            <canvas id="chart-sim-bar" style="max-height:280px;"></canvas>
        </div>
    </div>

    <div class="card mt1">
        <div class="card-title"><i class="fa-solid fa-table"></i> Persona Purchase Map</div>
        <div class="table-wrap">
            <table class="persona-tbl">
                <thead>
                    <tr>
                        <th>Persona</th>
                        <th>Product Chosen</th>
                        <th>Purchase Probability</th>
                        <th>Likelihood</th>
                    </tr>
                </thead>
                <tbody id="sim-persona-tbody">
                    <!-- populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <div class="action-bar">
        <button class="btn btn-secondary" id="btn-p7-back"><i class="fa-solid fa-arrow-left"></i> Back</button>
        <button class="btn btn-outline" id="btn-download-sim"><i class="fa-solid fa-download"></i> Download Report</button>
        <button class="btn btn-primary ml" id="btn-p7-new" onclick="location.reload()"><i class="fa-solid fa-plus"></i> New Analysis</button>
    </div>
</div>
