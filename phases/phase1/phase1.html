<!-- phases/phase1/phase1.html -->
<div class="phase active">
    <h1>Product Details</h1>
    <p class="subtitle">Describe your product and we'll discover the closest market competitors automatically.</p>
    <div class="card">
        <div class="card-title"><i class="fa-solid fa-cube"></i> Product Blueprint</div>
        <div class="form-grid">
            <div>
                <label>Product Name *</label>
                <input type="text" id="p-name" placeholder="e.g. iPhone 17 Pro" />
            </div>
            <div class="input-prefix">
                <label>Target Price (USD) *</label>
                <span>$</span>
                <input type="number" id="p-price" placeholder="1199" min="0" step="0.01" />
            </div>
            <div class="form-full">
                <label>Short Description *</label>
                <textarea id="p-desc" rows="3" placeholder="Describe what the product does, its target audience and primary value proposition..."></textarea>
            </div>
            <div class="form-full">
                <label>Key Features <span class="text-secondary">(press Enter or comma to add)</span></label>
                <input type="text" id="p-feat-input" placeholder="e.g. Periscope zoom, USB-C, A17 chip..." />
                <div style="display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.65rem;" id="feat-chips"></div>
            </div>
        </div>
        <div class="action-bar">
            <span class="text-sm text-secondary"><i class="fa-solid fa-circle-info"></i> AI-powered competitor discovery uses Gemini search. Ensure your API key is set.</span>
            <button class="btn btn-primary ml" id="btn-p1-next">Next: Find Competitors <i class="fa-solid fa-arrow-right"></i></button>
        </div>
    </div>
</div>
