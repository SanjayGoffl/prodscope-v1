<div class="phase active">
    <h1>Synthetic Persona Reactions</h1>
    <p class="subtitle">AI personas are evaluating your product vs selected competitors in real time.</p>

    <div class="sim-status-bar" id="sim-status-bar">
        <span class="spin-icon" style="display:inline-block; animation:spin 1s linear infinite;"><i class="fa-solid fa-circle-notch"></i></span>
        <span id="sim-status-text">Initialising simulation…</span>
        <span class="badge badge-blue" id="sim-progress-badge" style="margin-left:auto">0 / 20</span>
    </div>

    <div class="persona-grid" id="persona-grid">
        <!-- Cards injected by JS -->
    </div>

    <div class="action-bar">
        <button class="btn btn-secondary" id="btn-p6-back"><i class="fa-solid fa-arrow-left"></i> Back</button>
        <button class="btn btn-primary ml disabled" id="btn-p6-next">
            View Outcome <i class="fa-solid fa-arrow-right"></i>
        </button>
    </div>
</div>
